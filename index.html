<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Quản Lý Đăng Ký MOS - Hệ Thống Đồng Bộ</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --teal:#00897B;--teal-d:#00695C;--teal-l:#4DB6AC;--teal-bg:#E0F2F1;
  --blue:#1a4fa0;--blue-d:#143d82;
  --black:#1C2B33;--white:#fff;
  --g100:#F5F8FA;--g200:#EDF1F4;--g300:#D4DDE4;--g500:#7A8FA0;--g700:#3D5263;
  --red:#E53935;--green:#388E3C;
  --sh-sm:0 2px 8px rgba(0,105,92,.08);--sh-lg:0 12px 48px rgba(0,0,0,.14);--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--g100);color:var(--black);min-height:100vh;font-size:14px}

/* LOGIN SCREEN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#004D40 0%,#00796B 55%,#4DB6AC 100%)}
.login-card{background:#fff;border-radius:20px;padding:40px;width:400px;box-shadow:var(--sh-lg);position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--blue),var(--teal))}
.ms-logo-big{width:80px;height:80px;background:var(--blue);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 18px;color:#fff;font-size:30px;font-weight:900}
.login-title{text-align:center;font-size:22px;font-weight:800;margin-bottom:20px}
.fg{margin-bottom:15px}
.fg label{display:block;font-size:12px;font-weight:700;margin-bottom:6px}
.fg input{width:100%;padding:10px;border:1.5px solid var(--g300);border-radius:var(--r);font-family:inherit}
.btn-login{width:100%;padding:12px;background:var(--teal);color:#fff;border:none;border-radius:var(--r);font-weight:700;cursor:pointer}

/* APP LAYOUT */
#app{display:none;min-height:100vh;flex-direction:column}
.topbar{height:52px;background:#fff;border-bottom:1px solid var(--g200);display:flex;align-items:center;padding:0 20px;box-shadow:var(--sh-sm)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:15px}
.tabbar{display:flex;gap:2px;padding:10px 20px 0;background:var(--g200)}
.tab{padding:10px 15px;border:none;background:transparent;font-weight:600;cursor:pointer;border-radius:8px 8px 0 0}
.tab.active{background:#fff;color:var(--teal)}
.panel{display:none;padding:20px}
.panel.active{display:block}

/* TABLES */
.tbl-wrap{background:#fff;border-radius:var(--r);border:1px solid var(--g200);overflow:hidden}
.tbl-scroll{overflow:auto;max-height:calc(100vh - 280px)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--teal);color:#fff;padding:12px;text-align:left;position:sticky;top:0;z-index:10}
tbody tr:hover{background:var(--teal-bg)}
tbody tr.sel{background:rgba(0,137,123,0.1);outline:2px solid var(--teal)}
tbody td{padding:10px;border-bottom:1px solid var(--g200)}

/* BUTTONS */
.btn{padding:8px 15px;border:none;border-radius:6px;font-weight:600;cursor:pointer;margin-right:5px;display:inline-flex;align-items:center;gap:5px}
.btn.primary{background:var(--teal);color:#fff}
.btn.sec{border:1.5px solid var(--teal);color:var(--teal);background:transparent}
.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;background:#333;color:#fff;border-radius:8px;display:none;z-index:999}

/* PRINT STYLES */
@media print {
    body * { visibility: hidden; }
    #print-section, #print-section * { visibility: visible; }
    #print-section { position: absolute; left: 0; top: 0; width: 100%; }
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="ms-logo-big">MS</div>
    <div class="login-title">HỆ THỐNG QUẢN LÝ MOS</div>
    <div class="fg"><label>Tài khoản</label><input id="inp-u" type="text" value="admin"/></div>
    <div class="fg"><label>Mật khẩu</label><input id="inp-p" type="password" value="1234"/></div>
    <button class="btn-login" onclick="doLogin()">ĐĂNG NHẬP</button>
    <div id="lerr" style="color:red;font-size:12px;margin-top:10px;text-align:center"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="font-weight:800;color:var(--teal)">MS CENTER</div>
    <div class="topbar-right">
      <span id="tuser" style="font-weight:600; font-size:12px"></span>
      <button class="btn-login" style="padding:5px 10px; width:auto; font-size:12px" onclick="doLogout()">Đăng xuất</button>
    </div>
  </div>
  <div class="tabbar">
    <button class="tab active" data-tab="dk" onclick="goTab('dk')">📋 Danh sách đăng ký</button>
    <button class="tab" data-tab="hv" onclick="goTab('hv')">👤 Học viên của tôi</button>
    <button class="tab" data-tab="cfg" onclick="goTab('cfg')">⚙️ Cấu hình</button>
  </div>

  <div class="panel active" id="panel-dk">
    <div style="margin-bottom:15px">
      <button class="btn primary" onclick="loadDK()">🔄 Tải lại dữ liệu</button>
      <button id="btn-get" class="btn sec" disabled onclick="dkGetInfo()">📥 Lấy thông tin học viên</button>
    </div>
    <div class="tbl-wrap"><div class="tbl-scroll">
      <table>
        <thead><tr><th>#</th><th>Ngày ĐK</th><th>Mã HV</th><th>Họ tên</th><th>Môn thi</th><th>Ngày thi</th></tr></thead>
        <tbody id="dk-body"></tbody>
      </table>
    </div></div>
  </div>

  <div class="panel" id="panel-hv">
    <div style="margin-bottom:15px">
      <button class="btn primary" onclick="loadHV()">🔄 Làm mới danh sách</button>
      <button id="btn-print" class="btn sec" disabled onclick="doPrintDirect()">🖨️ In phiếu trực tiếp</button>
    </div>
    <div class="tbl-wrap"><div class="tbl-scroll">
      <table>
        <thead><tr><th>#</th><th>Đợt thi</th><th>Mã HV</th><th>Họ tên</th><th>Môn thi</th><th>Trạng thái</th></tr></thead>
        <tbody id="hv-body"></tbody>
      </table>
    </div></div>
  </div>

  <div class="panel" id="panel-cfg">
    <div style="max-width:500px;background:#fff;padding:20px;border-radius:10px; border:1px solid var(--g300)">
      <h3>Cấu hình hệ thống</h3>
      <div class="fg" style="margin-top:15px"><label>Apps Script Web App URL</label>
      <input id="cfg-url" type="text" placeholder="https://script.google.com/.../exec"/></div>
      <button class="btn primary" onclick="saveConfig()">Lưu cấu hình</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
let API_URL = '';
let currentUser = null;
let allDK = [], myHV = [];
let selDK = null, selHV = null;

const g = id => document.getElementById(id);

// 1. SESSION & LOGIN
function loadSession() {
    const data = localStorage.getItem('mos_session_v2');
    if (data) {
        const parsed = JSON.parse(data);
        API_URL = parsed.url || '';
        g('cfg-url').value = API_URL;
        if (parsed.user) {
            currentUser = parsed.user;
            showApp();
        }
    }
}

async function doLogin() {
    const u = g('inp-u').value, p = g('inp-p').value;
    if (u && p) { 
        currentUser = { u: u, role: 'user' };
        localStorage.setItem('mos_session_v2', JSON.stringify({user: currentUser, url: API_URL}));
        showApp();
    }
}

function showApp() {
    g('login-screen').style.display = 'none';
    g('app').style.display = 'flex';
    g('tuser').textContent = 'Tài khoản: ' + currentUser.u;
    loadDK();
}

function doLogout() {
    localStorage.removeItem('mos_session_v2');
    location.reload();
}

// 2. API & DATA
async function api(params) {
    if (!API_URL) { toast('Chưa cấu hình URL Apps Script!', 'red'); return; }
    const qs = new URLSearchParams(params).toString();
    const res = await fetch(`${API_URL}?${qs}`);
    return await res.json();
}

async function loadDK() {
    try {
        toast('Đang tải dữ liệu...', '#555');
        const data = await api({ action: 'getAvailable' });
        allDK = data || [];
        renderDK();
    } catch (e) { toast('Lỗi kết nối Server!', 'red'); }
}

function renderDK() {
    g('dk-body').innerHTML = allDK.map((r, i) => `
        <tr onclick="selectDK(${i})" class="${selDK===i?'sel':''}">
            <td>${i+1}</td><td>${r.ngayDangKy||''}</td><td>${r.maHV}</td>
            <td><b>${r.hoTen}</b></td><td>${r.monThi}</td><td>${r.ngayThi||''}</td>
        </tr>
    `).join('');
    g('btn-get').disabled = true;
}

function selectDK(i) {
    selDK = i;
    renderDK();
    g('btn-get').disabled = false;
}

async function dkGetInfo() {
    if (selDK === null) return;
    const item = allDK[selDK];
    try {
        toast('Đang xử lý đồng bộ...', 'teal');
        await api({
            action: 'saveHVData',
            user: currentUser.u,
            maHV: item.maHV,
            data: JSON.stringify(item)
        });
        toast('Thành công! Dòng này đã được ẩn với mọi người.', 'green');
        selDK = null;
        await loadDK(); 
        goTab('hv');
    } catch (e) { toast('Lỗi xử lý!', 'red'); }
}

async function loadHV() {
    try {
        const data = await api({ action: 'getMyStudents', user: currentUser.u });
        myHV = data || [];
        renderHV();
    } catch (e) { toast('Lỗi tải danh sách học viên!', 'red'); }
}

function renderHV() {
    g('hv-body').innerHTML = myHV.map((r, i) => `
        <tr onclick="selectHV(${i})" class="${selHV===i?'sel':''}">
            <td>${i+1}</td><td>${r.dotThi}</td><td>${r.maHV}</td>
            <td><b>${r.hoTen}</b></td><td>${r.monThi}</td><td>✅ Đã lấy</td>
        </tr>
    `).join('');
    g('btn-print').disabled = true;
}

function selectHV(i) {
    selHV = i;
    renderHV();
    g('btn-print').disabled = false;
}

// 3. PRINT DIRECT (IN TRỰC TIẾP)
function doPrintDirect() {
    if (selHV === null) return;
    const r = myHV[selHV];
    const printWindow = window.open('', '_blank', 'width=800,height=900');
    
    printWindow.document.write(`
        <html>
        <head>
            <title>Phiếu Đăng Ký - ${r.hoTen}</title>
            <style>
                body { font-family: "Segoe UI", Tahoma, sans-serif; padding: 40px; color: #333; }
                .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 30px; }
                .title { font-size: 24px; font-weight: bold; }
                .info-row { margin: 15px 0; font-size: 16px; display: flex; }
                .label { font-weight: bold; width: 150px; }
                .footer { margin-top: 60px; display: flex; justify-content: space-between; }
                .sign { text-align: center; width: 250px; }
                @media print { .no-print { display: none; } }
            </style>
        </head>
        <body>
            <div class="header">
                <div class="title">PHIẾU ĐĂNG KÝ DỰ THI MOS</div>
                <div style="margin-top:5px">Trung Tâm Tin Học Thực Hành MS</div>
            </div>
            <div class="info-row"><span class="label">Họ và Tên:</span> <span>${r.hoTen}</span></div>
            <div class="info-row"><span class="label">Mã Học Viên:</span> <span>${r.maHV}</span></div>
            <div class="info-row"><span class="label">Môn Thi:</span> <span>${r.monThi}</span></div>
            <div class="info-row"><span class="label">Đợt Thi:</span> <span>${r.dotThi}</span></div>
            <div class="info-row"><span class="label">Ngày Thi:</span> <span>${r.ngayThi || 'Theo thông báo'}</span></div>
            
            <div style="margin-top:30px; font-style: italic; border: 1px dashed #ccc; padding: 10px;">
                Lưu ý: Thí sinh mang theo CCCD bản gốc khi đi thi và có mặt trước 15 phút.
            </div>

            <div class="footer">
                <div class="sign">Người đăng ký<br><br><br><br><b>${r.hoTen}</b></div>
                <div class="sign">Người tiếp nhận<br><br><br><br><b>${currentUser.u}</b></div>
            </div>
            <script>
                window.onload = function() { window.print(); window.onafterprint = function() { window.close(); }; };
            <\/script>
        </body>
        </html>
    `);
    printWindow.document.close();
}

// 4. UI TABS & UTILS
function goTab(t) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    g('panel-' + t).classList.add('active');
    document.querySelector(`[data-tab="${t}"]`).classList.add('active');
    if (t === 'hv') loadHV();
}

function saveConfig() {
    API_URL = g('cfg-url').value;
    localStorage.setItem('mos_session_v2', JSON.stringify({user: currentUser, url: API_URL}));
    toast('Đã lưu cấu hình!', 'green');
}

function toast(m, c) {
    const t = g('toast');
    t.textContent = m; t.style.background = c; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

window.onload = loadSession;
</script>
</body>
</html>
